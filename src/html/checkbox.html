<div class="checboxes">
  <div class="container">
    <div class="checkboxes__list">
      <!--  -->
      <div class="checkbox">
        <input
          class="first__checkbox input"
          id="first__checkbox"
          type="checkbox"
        />
        <label class="first" for="first__checkbox"> </label>
      </div>
      <!-- !second -->
      <div class="checkbox">
        <input
          class="second__checkbox input"
          id="second__checkbox"
          type="checkbox"
        />
        <label class="second" for="second__checkbox"
          ><span>no</span> <span>yes</span></label
        >
      </div>
      <!-- !third -->
      <div class="checkbox">
        <input
          class="third__checkbox input"
          id="third__checkbox"
          type="checkbox"
        />
        <label class="third" for="third__checkbox"
          ><div class="third__img">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="30"
              height="30"
              viewBox="0 0 24 24"
            >
              <path
                d="M20.285 2l-11.285 11.567-5.286-5.011-3.714 3.716 9 8.728 15-15.285z"
              />
            </svg></div
        ></label>
      </div>
      <!-- !fourth -->
      <div class="checkbox">
        <input
          type="checkbox"
          class="fourth__checkbox input"
          id="fourth__checkbox"
        />
        <label class="fourth" for="fourth__checkbox"></label>
      </div>

      <!-- !fifth -->
      <div class="checkbox">
        <input
          type="checkbox"
          class="fifth__checkbox input"
          id="fifth__checkbox"
        />
        <label for="fifth__checkbox" class="fifth"></label>
      </div>
    </div>
  </div>
</div>
