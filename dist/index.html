<!DOCTYPE html>
<html lang="en">
  <head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/style.min.css" />
  <link rel="stylesheet" href="css/footer.min.css" />
  <link rel="stylesheet" href="css/checkbox.min.css" />
  <link rel="stylesheet" href="css/forms.min.css" />
  <title>Главная</title>
</head>

  <body>
    <header class="header">
  <div class="header__container">
    <h2>This is my fun page</h2>
  </div>
</header>

    <!--  -->
    <main>
      <!-- checkboxes -->
      <div class="checboxes">
  <div class="container">
    <div class="checkboxes__list">
      <!--  -->
      <div class="checkbox">
        <input
          class="first__checkbox input"
          id="first__checkbox"
          type="checkbox"
        />
        <label class="first" for="first__checkbox"> </label>
      </div>
      <!-- !second -->
      <div class="checkbox">
        <input
          class="second__checkbox input"
          id="second__checkbox"
          type="checkbox"
        />
        <label class="second" for="second__checkbox"
          ><span>no</span> <span>yes</span></label
        >
      </div>
      <!-- !third -->
      <div class="checkbox">
        <input
          class="third__checkbox input"
          id="third__checkbox"
          type="checkbox"
        />
        <label class="third" for="third__checkbox"
          ><div class="third__img">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="30"
              height="30"
              viewBox="0 0 24 24"
            >
              <path
                d="M20.285 2l-11.285 11.567-5.286-5.011-3.714 3.716 9 8.728 15-15.285z"
              />
            </svg></div
        ></label>
      </div>
      <!-- !fourth -->
      <div class="checkbox">
        <input
          type="checkbox"
          class="fourth__checkbox input"
          id="fourth__checkbox"
        />
        <label class="fourth" for="fourth__checkbox"></label>
      </div>

      <!-- !fifth -->
      <div class="checkbox">
        <input
          type="checkbox"
          class="fifth__checkbox input"
          id="fifth__checkbox"
        />
        <label for="fifth__checkbox" class="fifth"></label>
      </div>
    </div>
  </div>
</div>

      <!-- forms -->
      <div class="forms">
  <!-- ! -->
  <div class="form">
    <form class="first__form" action="#">
      <h2>Форма для регистрации</h2>
      <label for="">
        <input type="text" name="" id="" />
        <span>имя</span>
      </label>
      <label for="">
        <input type="text" name="" id="" />
        <span>email</span>
      </label>
      <label for="">
        <input type="text" name="" id="" />
        <span>пароль</span>
      </label>
      <label for="">
        <input type="text" name="" id="" />
        <span>секретный вопрос</span>
      </label>
    </form>
  </div>
  <!-- ! -->
  <div class="form"></div>
  <!-- ! -->
  <div class="form"></div>
  <!-- ! -->
  <div class="form"></div>
  <!-- ! -->
  <div class="form"></div>
</div>

    </main>
    <!--  -->
    <footer></footer>


    <script src="./js/app.min.js"></script>
  </body>
</html>
